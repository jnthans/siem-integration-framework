title: SIEM Integration Framework
description: Architecture and patterns from production Wazuh integrations — templates and LLM references for building your own
theme: jekyll-theme-minimal
baseurl: /siem-integration-framework
url: https://jnthans.github.io

plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

defaults:
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - templates/
  - llm-references/
  - examples/
  - LICENSE
