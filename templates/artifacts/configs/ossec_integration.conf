<!--
  {VENDOR_DISPLAY} — ossec.conf wodle stanza.

  Add this block inside <ossec_config> in /var/ossec/etc/ossec.conf.

  CUSTOMIZE:
    - Replace {VENDOR_LOWER} with your vendor name
    - Adjust interval based on rate limit budget
    - Adjust timeout based on expected run duration
-->

<wodle name="command">
  <disabled>no</disabled>
  <tag>{VENDOR_LOWER}</tag>
  <command>/var/ossec/wodles/{VENDOR_LOWER}/run.sh</command>
  <interval>5m</interval>
  <ignore_output>no</ignore_output>
  <run_on_start>yes</run_on_start>
  <timeout>120</timeout>
</wodle>
